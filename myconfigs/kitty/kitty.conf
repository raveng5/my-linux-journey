# Set the default shell to Zsh
shell zsh

# Set the Nerd Font you just installed
font_family      JetBrainsMono Nerd Font
font_size        11.0

# Include the auto-generated theme if needed
include dark-theme.auto.conf

# hide the upper thingy
hide_window_decorations yes

# Background opacity
background_opacity 0.85

# Keep the text fully solid even when the background is blurry/transparent
dynamic_background_opacity yes
